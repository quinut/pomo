<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay" class="glass-overlay" style="display: none;">
        <div class="login-modal">
            <button id="btn-close-login" class="icon-btn close-btn" title="Close"><i class="ri-close-line"></i></button>
            <h2>Focus Together</h2>
            <p>Sign in to see your friends' timer state.</p>
            <input type="text" id="username-input" placeholder="Enter your name..." style="padding: 1rem; border-radius: 15px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.1); color: white; outline: none; font-family: 'Inter', sans-serif; font-size: 1rem; text-align: center;">
            <button id="btn-mock-login" class="auth-btn" style="background: var(--primary-color);">Join Session</button>
            <button id="btn-login-google" class="auth-btn google-btn" onclick="window.location.href='/api/auth/google/login'"><i class="ri-google-fill"></i> Continue with Google</button>
            <button id="btn-login-discord" class="auth-btn discord-btn" onclick="window.location.href='/api/auth/discord/login'"><i class="ri-discord-fill"></i> Continue with Discord</button>
        </div>
    </div>

    <!-- Personal Todo Sidebar -->
    <div class="todo-sidebar glass-panel">
        <div class="sidebar-header">
            <h3><i class="ri-list-check"></i> Tasks</h3>
            <button id="btn-clear-todos" class="icon-btn" title="Clear Completed"><i class="ri-delete-bin-line"></i></button>
        </div>
        <div class="todo-input-wrapper">
            <input type="text" id="todo-input" placeholder="Add a task...">
            <button id="btn-add-todo" class="icon-btn"><i class="ri-add-line"></i></button>
        </div>
        <ul id="todo-list">
            <!-- Todos will be populated here -->
        </ul>
    </div>

    <!-- Online Friends Sidebar -->
    <div class="online-sidebar glass-panel">
        <div class="sidebar-header">
            <h3><i class="ri-group-line"></i> Online</h3>
            <div class="sidebar-actions">
                <button id="btn-show-login" class="icon-btn" title="Sign In"><i class="ri-login-box-line"></i></button>
                <button id="btn-logout" class="icon-btn" title="Sign Out" style="display: none;"><i class="ri-logout-box-r-line"></i></button>
            </div>
        </div>
        <ul id="online-users-list">
            <!-- Users will be populated here -->
        </ul>
    </div>

    <div class="glass-container">
        <div class="mode-selector">
            <button id="btn-pomodoro" class="mode-btn active">Pomodoro</button>
            <button id="btn-shortbreak" class="mode-btn">Short Break</button>
            <button id="btn-longbreak" class="mode-btn">Long Break</button>
        </div>

        <div class="timer-wrapper">
            <div class="timer-display">
                <span id="time-left">25:00</span>
            </div>
            <div class="time-adjust">
                <button id="btn-minus" class="adjust-btn" title="-1 min"><i class="ri-subtract-line"></i></button>
                <button id="btn-plus" class="adjust-btn" title="+1 min"><i class="ri-add-line"></i></button>
            </div>
        </div>

        <div class="controls">
            <button id="btn-play" class="control-btn play-btn">
                <i class="ri-play-fill"></i>
            </button>
            <button id="btn-reset" class="control-btn reset-btn">
                <i class="ri-refresh-line"></i>
            </button>
        </div>
        
        <div class="settings-hint">
            <p id="status-text">Ready to focus?</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
